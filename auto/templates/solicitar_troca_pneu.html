{% extends "base.html" %}
{% load static %}
<!-- CSS -->
{% block style %}
<link rel="stylesheet" href="{% static 'css/solicitar_socorro/solicitar_socorro.css' %}">
{% endblock %}
{% block content %}
<main>
    <header>
        <h1>🛞 Solicitar Troca de Pneu</h1>
        <p>Preencha os dados do seu veículo e localização para solicitar o serviço de troca de pneu</p>
    </header>
    <section class="form-section">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>
            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
            </div>
            <div class="form-group">
                <label for="veiculo">Tipo de Veículo:</label>
                <select id="veiculo" name="veiculo" required>
                    <option value="">Selecione o tipo de veículo</option>
                    <option value="moto">Moto</option>
                    <option value="carro">Carro pequeno</option>
                    <option value="utilitario">Caminhonete</option>
                    <option value="caminhao">Caminhão</option>
                    <option value="van">Van</option>
                </select>
            </div>
            <div class="form-group">
                <label for="localizacao">Localização Atual:</label>
                <div class="location-group">
                    <input type="text" id="localizacao" name="localizacao" placeholder="Rua, número, bairro ou coordenadas" required>
                    <button type="button" id="get-location" class="btn-location">📍 Minha Localização</button>
                </div>
            </div>
            <div class="form-group">
                <label for="problema">Descrição do Problema:</label>
                <textarea id="problema" name="problema" rows="4" placeholder="Descreva qual é o problema com o pneu (ex: furado, descalibrado, desgastado, etc)" required></textarea>
            </div>
            <div class="actions">
                <button type="button" class="btn-secondary" onclick="window.history.back()">Voltar</button>
                <button type="submit" class="btn-submit">Solicitar Troca de Pneu</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}
{% block scripts %}
<script>
    document.getElementById('get-location').addEventListener('click', function () {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function (position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                document.getElementById('localizacao').value = lat + ', ' + lng;
            }, function () {
                alert("Não foi possível obter sua localização. Insira manualmente.");
            });
        } else {
            alert("Geolocalização não suportada neste navegador.");
        }
    });
</script>
{% endblock %}
